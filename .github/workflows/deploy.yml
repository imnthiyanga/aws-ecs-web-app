name: Build and Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ectomuch/ecs-web-app
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          SHORT_SHA=${IMAGE_TAG::7}
          IMAGE_URI=$REGISTRY/$REPOSITORY:$SHORT_SHA

          docker build -t $IMAGE_URI .
          docker tag  $IMAGE_URI $REGISTRY/$REPOSITORY:latest

          docker push $IMAGE_URI
          docker push $REGISTRY/$REPOSITORY:latest

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Render ECS task definition with new image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  task-definition.json
          container-name:   web-app
          image:            ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service:         ecs-web-app-task-service-nu2gwwb0
          cluster:         ecs-web-app-newcluster
          wait-for-service-stability: true
